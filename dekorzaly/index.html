<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dekorzaly Ankieta</title>
  <!-- Shopify Survey Form - Dekorzaly -->
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --muted:#666;
      --text:#111;
      --border:#ddd;
      --focus:#111;
      --danger:#d32f2f;
      --radius:14px;
    }
    * { box-sizing: border-box; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; line-height:1.4; }
    .survey-container {
      max-width: 720px;
      margin: 24px auto;
      padding: 24px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    .survey-container h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .survey-container p {
      margin: 0 0 26px 0;
      color: var(--muted);
      font-size: 15px;
    }
    .question {
      margin-bottom: 22px;
      padding: 16px;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px;
      background: #fff;
    }
    .question-label {
      display: block;
      margin-bottom: 12px;
      font-weight: 650;
      color: var(--text);
      font-size: 15px;
    }
    .text-input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px; /* 16px prevents iOS zoom-on-focus */
      background: #fff;
    }
    .text-input:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }
    .name-hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      display: block;
    }
    .name-row {
      display: flex;
      gap: 12px;
    }
    .name-row .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .name-row .input-wrap label {
      font-size: 13px;
      color: var(--muted);
    }
    .radio-group, .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .radio-label, .checkbox-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 15px;
      color: #222;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.06);
      background: #fafafa;
    }
    .radio-label:hover, .checkbox-label:hover { background: #f6f6f6; }
    .radio-label input[type="radio"],
    .checkbox-label input[type="checkbox"] {
      margin: 0;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #111;
      flex: 0 0 auto;
    }
    .stars-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .star-btn {
      padding: 10px 12px;
      border: 2px solid rgba(0,0,0,0.12);
      background: #fff;
      border-radius: 12px;
      cursor: pointer;
      font-size: 20px;
      transition: transform 0.12s, border-color 0.12s, background 0.12s;
      min-width: 72px;
      text-align:center;
    }
    .star-btn:hover {
      border-color: #111;
      transform: translateY(-1px);
    }
    .star-btn.selected {
      border-color: #111;
      background: #f3f3f3;
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 650;
      cursor: pointer;
      margin-top: 14px;
      transition: transform 0.12s, opacity 0.12s;
    }
    .submit-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error-message {
      color: var(--danger);
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
    /* Mobile tweaks */
    @media (max-width: 520px){
      .survey-container{
        margin: 14px;
        padding: 18px;
      }
      .survey-container h2{
        font-size: 20px;
      }
      .question{
        padding: 14px;
      }
      .star-btn{
        flex: 1 1 calc(50% - 10px);
        min-width: 0;
      }
      .name-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="survey-container">
    <h2>Krótka ankieta</h2>
    <p>Odpowiedz na 5 pytań (zajmie to mniej niż 1 minutę).</p>
    <form id="surveyForm">
      <!-- Q1 -->
      <div class="question">
        <label class="question-label">P1. Jak się nazywasz?</label>
        <span class="name-hint">Podaj imię i nazwisko takie samo jak przy składaniu zamówienia.</span>
        <div class="name-row">
          <div class="input-wrap">
            <label for="firstName">Imię</label>
            <input type="text" class="text-input" id="firstName" name="firstName" placeholder="Imię" required>
          </div>
          <div class="input-wrap">
            <label for="lastName">Nazwisko</label>
            <input type="text" class="text-input" id="lastName" name="lastName" placeholder="Nazwisko" required>
          </div>
        </div>
        <div class="error-message" id="nameError">Proszę podać imię i nazwisko</div>
      </div>
      <!-- Q2 -->
      <div class="question">
        <label class="question-label">P2. Jak łatwo było złożyć zamówienie?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="ease" value="Bardzo łatwo" required>
            Bardzo łatwo
          </label>
          <label class="radio-label">
            <input type="radio" name="ease" value="Łatwo">
            Łatwo
          </label>
          <label class="radio-label">
            <input type="radio" name="ease" value="Neutralnie">
            Neutralnie
          </label>
          <label class="radio-label">
            <input type="radio" name="ease" value="Trudno">
            Trudno
          </label>
        </div>
        <div class="error-message" id="easeError">Proszę wybrać odpowiedź</div>
      </div>
      <!-- Q3 -->
      <div class="question">
        <label class="question-label">P3. Co skłoniło Cię do zakupu u nas?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="decision" value="Cena" required>
            Cena
          </label>
          <label class="radio-label">
            <input type="radio" name="decision" value="Jakość produktu">
            Jakość produktu
          </label>
          <label class="radio-label">
            <input type="radio" name="decision" value="Design">
            Design
          </label>
          <label class="radio-label">
            <input type="radio" name="decision" value="Opinie">
            Opinie
          </label>
          <label class="radio-label">
            <input type="radio" name="decision" value="Media społecznościowe">
            Media społecznościowe
          </label>
          <label class="radio-label">
            <input type="radio" name="decision" value="Inne">
            Inne
          </label>
        </div>
        <div class="error-message" id="decisionError">Proszę wybrać odpowiedź</div>
      </div>
      <!-- Q4 -->
      <div class="question">
        <label class="question-label">P4. Co moglibyśmy poprawić?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="improve" value="Wygląd strony" required>
            Wygląd strony
          </label>
          <label class="radio-label">
            <input type="radio" name="improve" value="Informacje o produktach">
            Informacje o produktach
          </label>
          <label class="radio-label">
            <input type="radio" name="improve" value="Proces zakupu">
            Proces zakupu
          </label>
          <label class="radio-label">
            <input type="radio" name="improve" value="Komunikacja / e-maile">
            Komunikacja / e-maile
          </label>
          <label class="radio-label">
            <input type="radio" name="improve" value="Nic — wszystko było świetne">
            Nic — wszystko było świetne
          </label>
        </div>
        <div class="error-message" id="improveError">Proszę wybrać odpowiedź</div>
      </div>
      <!-- Q5 -->
      <div class="question">
        <label class="question-label">P5. Ile gwiazdek dajesz za to doświadczenie?</label>
        <div class="stars-group" id="starsGroup">
          <button type="button" class="star-btn" data-stars="5" aria-label="5 gwiazdek">⭐⭐⭐⭐⭐</button>
          <button type="button" class="star-btn" data-stars="4" aria-label="4 gwiazdki">⭐⭐⭐⭐</button>
          <button type="button" class="star-btn" data-stars="3" aria-label="3 gwiazdki">⭐⭐⭐</button>
          <button type="button" class="star-btn" data-stars="2" aria-label="2 gwiazdki">⭐⭐</button>
          <button type="button" class="star-btn" data-stars="1" aria-label="1 gwiazdka">⭐</button>
        </div>
        <input type="hidden" name="stars" id="starsInput" required>
        <div class="error-message" id="starsError">Proszę wybrać ocenę</div>
      </div>
      <button type="submit" class="submit-btn">Wyślij</button>
    </form>
  </div>
  <script>
    (function() {
      const form = document.getElementById('surveyForm');
      const submitBtn = form.querySelector('.submit-btn');

      // Handle Q5 stars selection (ROBUST: works even if user clicks inside the button)
      const starsGroup = document.getElementById('starsGroup');
      const starsInput = document.getElementById('starsInput');
      starsGroup.addEventListener('click', function(e) {
        const btn = e.target.closest('.star-btn');
        if (!btn) return;
        starsGroup.querySelectorAll('.star-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        starsInput.value = btn.dataset.stars;
        document.getElementById('starsError').style.display = 'none';
      });

      // Form submission
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Validation
        let isValid = true;
        const firstName = form.querySelector('input[name="firstName"]').value.trim();
        const lastName = form.querySelector('input[name="lastName"]').value.trim();
        const ease = form.querySelector('input[name="ease"]:checked');
        const decision = form.querySelector('input[name="decision"]:checked');
        const improve = form.querySelector('input[name="improve"]:checked');
        const stars = starsInput.value;

        if (!firstName || !lastName) {
          document.getElementById('nameError').style.display = 'block';
          isValid = false;
        } else {
          document.getElementById('nameError').style.display = 'none';
        }
        if (!ease) {
          document.getElementById('easeError').style.display = 'block';
          isValid = false;
        } else {
          document.getElementById('easeError').style.display = 'none';
        }
        if (!decision) {
          document.getElementById('decisionError').style.display = 'block';
          isValid = false;
        } else {
          document.getElementById('decisionError').style.display = 'none';
        }
        if (!improve) {
          document.getElementById('improveError').style.display = 'block';
          isValid = false;
        } else {
          document.getElementById('improveError').style.display = 'none';
        }
        if (!stars) {
          document.getElementById('starsError').style.display = 'block';
          isValid = false;
        } else {
          document.getElementById('starsError').style.display = 'none';
        }

        if (!isValid) return;

        // Disable submit button
        submitBtn.disabled = true;
        submitBtn.textContent = 'Wysyłanie...';

        // Collect data
        const fullName = firstName + ' ' + lastName;
        const easeValue = ease.value;
        const decisionValue = decision.value;
        const improveValue = improve.value;
        const starRating = parseInt(stars, 10);

        // Open Trustpilot FIRST (before any async operations) for mobile compatibility
        // Mobile browsers block window.open() if not in direct user action
        if (starRating >= 3) {
          window.open('https://www.trustpilot.com/evaluate/dekorzaly.com', '_blank');
        }

        // Send to Discord (UPDATED WEBHOOK)
        const webhookUrl = 'https://discordapp.com/api/webhooks/1480188673906442331/pmIkwDV-PdmDeba-SGDqoXp9SwgJX96dHoQLhcFD3el1cfrWqkRXEYYwdCYXQhi2mJqL';
        const discordPayload = {
          embeds: [{
            title: '📋 New Survey Response - Dekorzaly',
            color: 3066993,
            fields: [
              { name: 'Q1. Name', value: fullName, inline: false },
              { name: 'Q2. Order Ease', value: easeValue, inline: true },
              { name: 'Q5. Rating', value: '⭐'.repeat(starRating) + ` (${starRating} stars)`, inline: true },
              { name: 'Q3. Decision Factor', value: decisionValue, inline: false },
              { name: 'Q4. Improvement', value: improveValue, inline: false }
            ],
            timestamp: new Date().toISOString()
          }]
        };

        try {
          // Send to Discord (use sendBeacon for reliability on redirect)
          const blob = new Blob([JSON.stringify(discordPayload)], { type: 'application/json' });
          if (navigator.sendBeacon) {
            navigator.sendBeacon(webhookUrl, blob);
          } else {
            await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(discordPayload)
            });
          }

          // Small delay to help ensure the webhook request is sent before redirect
          await new Promise(resolve => setTimeout(resolve, 300));

          // Redirect to YOUR GitHub Pages thank you page
          window.location.href = 'thankyou.html';
        } catch (error) {
          console.error('Error submitting survey:', error);
          // Still redirect even if Discord fails
          window.location.href = 'thankyou.html';
        }
      });
    })();
  </script>
</body>
</html>
